<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Lanka - May 18, 2009</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0d1117;
      color: white;
      line-height: 1.6;
    }

    header {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1600&auto=format&fit=crop') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero {
      max-width: 900px;
    }

    .hero h1 {
      font-size: 4rem;
      color: #ffd700;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .hero p {
      font-size: 1.3rem;
      color: #ddd;
    }

    section {
      padding: 80px 10%;
    }

    h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #ffd700;
    }
</html>
